name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - id: get_version
        shell: bash
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f2 | cut -d '+' -f1)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: extract-version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      PUB_CACHE: .pub-cache
    steps:
      - uses: actions/checkout@v4

      - name: Cache Pub packages (Windows)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.pub-cache
          key: windows-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            windows-pub-cache-

      - uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.32.0-0.3.pre"
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Create Windows ZIP Archive with version
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $zipPath = "build/windows/x64/runner/CTF-Tools-v$env:VERSION-windows-release.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipPath

      - name: Upload Windows Build to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/x64/runner/CTF-Tools-v${{ needs.extract-version.outputs.version }}-windows-release.zip

  build-linux:
    needs: extract-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      PUB_CACHE: .pub-cache
    steps:
      - uses: actions/checkout@v4

      - name: Cache Pub packages (Linux)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pub-cache
          key: linux-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            linux-pub-cache-

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.32.0-0.3.pre"
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux Executable
        run: flutter build linux --release

      - name: Create Linux tar.gz Archive with version
        shell: bash
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf "CTF-Tools-v${VERSION}-linux-release.tar.gz" *

      - name: Upload Linux Build to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/linux/x64/release/bundle/CTF-Tools-v${{ needs.extract-version.outputs.version }}-linux-release.tar.gz

  build-macos:
    needs: extract-version
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      PUB_CACHE: .pub-cache
    steps:
      - uses: actions/checkout@v4

      - name: Cache Pub packages (macOS)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pub-cache
          key: macos-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            macos-pub-cache-

      - uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.32.0-0.3.pre"
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Build MacOS Executable
        run: flutter build macos --release

      - name: Create MacOS ZIP Archive with version
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r "CTF-Tools-v${VERSION}-macos-release.zip" "ctf_tools.app"

      - name: Upload MacOS Build to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/CTF-Tools-v${{ needs.extract-version.outputs.version }}-macos-release.zip